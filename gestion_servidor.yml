---
- name: Gestion Integral del Servidor
  hosts: all
  become: yes
  become_method: sudo
  become_user: root

  vars:
    # EDITAR AQUÍ: Pon los nombres exactos de tus contenedores críticos
    contenedores_criticos:
      - mariadb
      - nextcloud
      - wp-ygb
      - n8n-ai

  tasks:
    # 1. ACCIÓN: INICIAR
    - name: Iniciar contenedores específicos
      docker_container:
        name: "{{ item | trim }}"
        state: started
      loop: "{{ (contenedor_nombre | default('')).split(',') }}"
      when: 
        - (accion | default('') is search('levantar', ignorecase=True) or accion | default('') is search('Iniciar', ignorecase=True))
        - contenedor_nombre | default('') | trim | length > 0

    # 2. ACCIÓN: REINICIAR
    - name: Reiniciar contenedores específicos
      docker_container:
        name: "{{ item | trim }}"
        state: started
        restart: yes
      loop: "{{ (contenedor_nombre | default('')).split(',') }}"
      when: 
        - (accion | default('') is search('reiniciar', ignorecase=True))
        - contenedor_nombre | default('') | trim | length > 0

    # 3. ACCIÓN: VER LOGS (100 líneas)
    - name: Obtener logs de contenedores
      shell: "docker logs --tail 100 {{ item | trim }}"
      register: docker_logs
      loop: "{{ (contenedor_nombre | default('')).split(',') }}"
      when: 
        - (accion | default('') is search('ver_logs', ignorecase=True) or accion | default('') is search('Logs', ignorecase=True))
        - contenedor_nombre | default('') | trim | length > 0
      failed_when: false

    - name: Mostrar logs en Semaphore
      debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ docker_logs.results | default([]) }}"
      when: 
        - (accion | default('') is search('ver_logs', ignorecase=True) or accion | default('') is search('Logs', ignorecase=True))
        - item.stdout_lines is defined

    # 4. ACCIÓN: LIBERAR SWAP
    - name: Vaciar y reactivar memoria SWAP
      shell: "swapoff -a && swapon -a"
      when: (accion | default('') is search('liberar_swap', ignorecase=True) or accion | default('') is search('Liberar', ignorecase=True))

    # 5. ACCIÓN: LISTAR
    - name: Obtener info de Docker
      docker_host_info:
        containers: yes
        containers_all: yes
      register: docker_info
      when: (accion | default('') is search('listar', ignorecase=True) or accion | default('') is search('Listar', ignorecase=True))

    - name: Mostrar lista de todos los contenedores
      debug:
        msg: "-> {{ item.Names[0] | replace('/', '') }} - {{ item.Status }}"
      loop: "{{ docker_info.containers | default([]) }}"
      when: 
        - (accion | default('') is search('listar', ignorecase=True) or accion | default('') is search('Listar', ignorecase=True))
        - docker_info.containers is defined
      loop_control:
        label: "{{ item.Names[0] | replace('/', '') }}"

    # 6. ACCIÓN: AUDITAR (Vigila críticos y envía correo)
    - name: Obtener estado para auditoría
      docker_host_info:
        containers: yes
        containers_all: yes
      register: docker_audit
      when: (accion | default('') is search('auditar', ignorecase=True))

    - name: Filtrar críticos caídos
      set_fact:
        criticos_caidos: >-
          {% set caidos = [] %}
          {% for c in (docker_audit.containers | default([])) %}
            {% set nombre = c.Names[0] | replace('/', '') %}
            {% if nombre in contenedores_criticos and 'Up' not in c.Status %}
              {% set _ = caidos.append(nombre) %}
            {% endif %}
          {% endfor %}
          {{ caidos }}
      when: (accion | default('') is search('auditar', ignorecase=True))

    - name: Enviar correo de alerta
      community.general.mail:
        host: mail.proyectolanuevatierra.com
        port: 587
        secure: starttls
        username: admin@proyectolanuevatierra.com
        from: admin@proyectolanuevatierra.com
        password: e9gcb3pgedzo3lovwgd8jjn4wezryw2c4e2pdbjxpsfo02neuggdiv67g13qogv1
        to: lauragonzalez.150463@gmail.com
        subject: "⚠️ ALERTA: Contenedores caídos en {{ inventory_hostname }}"
        body: "Se han detectado servicios críticos fuera de servicio: {{ criticos_caidos | join(', ') }}"
      when: 
        - (accion | default('') is search('auditar', ignorecase=True))
        - criticos_caidos | default([]) | length > 0

    # 7. ACCIÓN: ACTUALIZAR SISTEMA
    - name: Actualizar sistema
      apt:
        update_cache: yes
        upgrade: dist
      when: (accion | default('') is search('actualizar', ignorecase=True) or accion | default('') is search('Actualizar', ignorecase=True))
