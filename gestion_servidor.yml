---
- name: Gestion Integral del Servidor
  hosts: all
  become: yes
  become_method: sudo
  become_user: root

  tasks:
    - name: DEBUG - Ver valor de la variable
      debug:
        msg: "La variable accion recibida es: '{{ accion }}'"

    - name: Obtener info de todos los contenedores
      docker_host_info:
        containers: yes
        containers_show_all: yes  # <--- Esta es la forma correcta de ver los parados
      register: docker_info
      when: "'listar' in accion or 'Listar' in accion"

    - name: Mostrar estado de los contenedores
      debug:
        msg: "-> NOMBRE: {{ item.Names[0] | replace('/', '') }} | ESTADO: {{ item.State }} | STATUS: {{ item.Status }}"
      loop: "{{ docker_info.containers | default([]) }}"
      loop_control:
        label: "{{ item.Names[0] | default('container') }}"
      when: 
        - "'listar' in accion or 'Listar' in accion"
        - docker_info.containers is defined

    - name: Actualizar lista de paquetes (apt update)
      apt:
        update_cache: yes
      when: "'actualizar' in accion or 'Actualizar' in accion"

    - name: Ejecutar actualización completa (apt upgrade)
      apt:
        upgrade: dist
      when: "'actualizar' in accion or 'Actualizar' in accion"

    - name: Reiniciar el servidor
      reboot:
      when: "'reiniciar' in accion or 'Reiniciar' in accion"

    - name: Descargar e instalar Netdata
      shell: "curl -Ss https://get.netdata.cloud/kickstart.sh | sh -s -- --non-interactive"
      when: "'instalar_netdata' in accion or 'Instalar' in accion"
