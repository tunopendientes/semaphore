---
- name: Gestion Integral del Servidor
  hosts: all
  become: yes
  become_method: sudo
  become_user: root

  vars:
    # Tus contenedores críticos
    contenedores_criticos:
      - mariadb
      - nextcloud
      - wp-ygb
      - n8n-ai

  tasks:
    # ... (Tareas 1 a 5 se mantienen exactamente igual) ...
    # 1. Iniciar, 2. Reiniciar, 3. Logs, 4. Swap, 5. Listar (SIN CAMBIOS)

    # 6. ACCIÓN: AUDITAR
    - name: Obtener estado para auditoría
      docker_host_info:
        containers: yes
        containers_all: yes
      register: docker_audit
      when: (accion | default('') is search('auditar', ignorecase=True))

    - name: Filtrar críticos caídos
      set_fact:
        criticos_caidos: "{{ docker_audit.containers | selectattr('State', 'defined') | selectattr('State', 'ne', 'running') | map(attribute='Names') | map('first') | map('replace', '/', '') | intersect(contenedores_criticos) | list }}"
      when: (accion | default('') is search('auditar', ignorecase=True))

    - name: Enviar correo de alerta
      community.general.mail:
        host: mail.proyectolanuevatierra.com
        port: 587
        secure: starttls
        username: admin@proyectolanuevatierra.com
        from: admin@proyectolanuevatierra.com
        password: e9gcb3pgedzo3lovwgd8jjn4wezryw2c4e2pdbjxpsfo02neuggdiv67g13qogv1
        to: lauragonzalez.150463@gmail.com
        subject: "⚠️ ALERTA: Contenedores caídos en {{ inventory_hostname }}"
        body: |
          Se han detectado servicios críticos caídos.

          Servicios afectados:
          {{ criticos_caidos | join(', ') }}

          Acción recomendada: Entrar en Semaphore y reiniciar los contenedores mencionados.
      when: 
        - (accion | default('') is search('auditar', ignorecase=True))
        - criticos_caidos | length > 0

    # 7. ACCIÓN: ACTUALIZAR SISTEMA
    - name: Actualizar sistema
      apt:
        update_cache: yes
        upgrade: dist
      when: (accion | default('') is search('actualizar', ignorecase=True) or accion | default('') is search('Actualizar', ignorecase=True))
