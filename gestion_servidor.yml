---
- name: Gestion Integral del Servidor
  hosts: all
  become: yes
  become_method: sudo
  become_user: root

  tasks:
    # 1. LEVANTAR (Soporta uno o varios)
    - name: Levantar contenedores
      docker_container:
        name: "{{ item | trim }}"
        state: started
      loop: "{{ (contenedor_nombre | default('')).split(',') }}"
      when: accion == 'levantar' and contenedor_nombre | default('') | length > 0

    # 2. LISTAR (Vuelve a la forma que te funcionaba)
    - name: Obtener info de Docker
      docker_host_info:
        containers: yes
      register: docker_info
      when: accion == 'listar'

    - name: Mostrar lista
      debug:
        msg: "-> {{ item.Names[0] | replace('/', '') }} - {{ item.Status }}"
      loop: "{{ docker_info.containers }}"
      when: accion == 'listar' and docker_info.containers is defined

    # 3. ACTUALIZAR
    - name: Actualizar sistema
      apt:
        update_cache: yes
        upgrade: dist
      when: accion == 'actualizar'
