---
- name: Gestion Integral del Servidor
  hosts: all
  become: yes
  become_method: sudo
  become_user: root

  vars:
    # EDITAR AQUÍ: Pon los nombres exactos de los contenedores que quieres vigilar
    contenedores_criticos:
      - mariadb
      - netdata
      - semaphore
      - nextcloud
      - wp-lnt
      - wp-ygb

  tasks:
    # ... (Tus otras tareas: Iniciar, Reiniciar, Logs, Swap, Listar) ...

    # NUEVA ACCIÓN: AUDITORÍA SELECTIVA
    - name: Obtener estado de todos los contenedores
      docker_host_info:
        containers: yes
        containers_all: yes
      register: docker_audit
      when: (accion | default('') == 'auditar' or 'Auditar' in accion | default(''))

    - name: Filtrar solo los críticos que están parados
      set_fact:
        criticos_caidos: "{{ docker_audit.containers | selectattr('State', 'equalto', 'exited') | map(attribute='Names') | map('first') | map('replace', '/', '') | intersect(contenedores_criticos) | list }}"
      when: (accion | default('') == 'auditar' or 'Auditar' in accion | default(''))

    - name: Enviar correo de alerta selectiva
      community.general.mail:
        host: smtp.gmail.com
        port: 587
        secure: starttls
        username: "tu-correo@gmail.com"
        password: "tu-password-de-aplicacion"
        to: "tu-correo-destino@gmail.com"
        subject: "⚠️ ALERTA CRÍTICA: Contenedores caídos en {{ inventory_hostname }}"
        body: |
          Se ha detectado que los siguientes servicios CRÍTICOS no están funcionando:
          
          {{ criticos_caidos | join('\n') }}
          
          Por favor, accede a Semaphore para reiniciarlos.
      when: 
        - (accion | default('') == 'auditar' or 'Auditar' in accion | default(''))
        - criticos_caidos | length > 0
