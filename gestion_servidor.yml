---
- name: Gestion Integral del Servidor
  hosts: all
  become: yes
  become_method: sudo
  become_user: root

  tasks:
    # 1. ACCIÓN: LEVANTAR
    - name: Iniciar contenedores específicos
      docker_container:
        name: "{{ item | trim }}"
        state: started
      loop: "{{ (contenedor_nombre | default('')).split(',') }}"
      when: 
        - (accion | default('') == 'levantar' or 'Iniciar' in accion | default(''))
        - contenedor_nombre | default('') | trim | length > 0

    # 2. ACCIÓN: REINICIAR (Cambiado para que sea compatible con tu versión)
    - name: Reiniciar contenedores específicos
      docker_container:
        name: "{{ item | trim }}"
        state: started
        restart: yes
      loop: "{{ (contenedor_nombre | default('')).split(',') }}"
      when: 
        - (accion | default('') == 'reiniciar' or 'Reiniciar' in accion | default(''))
        - contenedor_nombre | default('') | trim | length > 0

    # 3. ACCIÓN: LISTAR
    - name: Obtener info de Docker
      docker_host_info:
        containers: yes
        containers_all: yes
      register: docker_info
      when: (accion | default('') == 'listar' or 'Listar' in accion | default(''))

    - name: Mostrar lista de todos los contenedores
      debug:
        msg: "-> {{ item.Names[0] | replace('/', '') }} - {{ item.Status }}"
      loop: "{{ docker_info.containers | default([]) }}"
      when: 
        - (accion | default('') == 'listar' or 'Listar' in accion | default(''))
        - docker_info.containers is defined
      loop_control:
        label: "{{ item.Names[0] | replace('/', '') }}"

    # 4. ACCIÓN: ACTUALIZAR SISTEMA
    - name: Actualizar sistema
      apt:
        update_cache: yes
        upgrade: dist
      when: (accion | default('') == 'actualizar' or 'Actualizar' in accion | default(''))
