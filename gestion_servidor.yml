---
- name: Diagnostico de Permisos
  hosts: all
  tasks:
    - name: ¿Quién soy yo?
      command: whoami
      register: quien_soy

    - name: ¿Puedo hacer sudo sin contraseña?
      command: sudo -n true
      register: puedo_sudo
      ignore_errors: yes

    - name: Mostrar resultados
      debug:
        msg: 
          - "Usuario SSH: {{ quien_soy.stdout }}"
          - "Resultado Sudo (0 es éxito): {{ puedo_sudo.rc }}"
